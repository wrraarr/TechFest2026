<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philharmonia Viola Sampler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1b2e; /* Deep purple dark background */
            color: #e2e8f0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #2d2442;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        h1 { color: #c084fc; margin-bottom: 5px; } /* Bright purple accent */
        .controls {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        select, button {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        select { background: #4c3c6d; color: white; border: 1px solid #6b5b95; }
        button { background: #9333ea; color: white; transition: 0.2s; }
        button:disabled { background: #4c3c6d; cursor: not-allowed; }
        
        #status { font-family: monospace; color: #e9d5ff; margin-bottom: 20px; }

        /* Keyboard CSS */
        .keyboard {
            display: flex;
            justify-content: center;
            position: relative;
            margin-top: 40px;
            height: 200px;
            user-select: none;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        .key {
            box-sizing: border-box;
            border: 1px solid #111;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            transition: background 0.1s;
            position: relative;
        }
        .white-key {
            width: 45px;
            height: 200px;
            background: #f8fafc;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            color: #4c3c6d;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .white-key:active, .white-key.playing { background: #d8b4fe; }
        
        .black-key {
            width: 28px;
            height: 120px;
            background: #0f172a;
            z-index: 2;
            margin-left: -14px;
            margin-right: -14px;
            border-radius: 0 0 4px 4px;
        }
        .black-key:active, .black-key.playing { background: #6b5b95; }

        /* Missing Sample State */
        .key.disabled {
            background: #4c3c6d; /* Greyed out */
            pointer-events: none;
            opacity: 0.5;
            border-color: #2d2442;
            color: transparent;
        }
        .black-key.disabled {
            background: #1e1b2e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎻 Viola Master Controller</h1>
    <p>Dynamically mapping samples from C3 (Low C String) to C7</p>

    <div class="controls">
        <button id="powerBtn">1. START ENGINE</button>
        <select id="dynamicSelect" disabled>
            <option value="pianissimo">Pianissimo</option>
            <option value="piano">Piano</option>
            <option value="mezzo-piano">Mezzo-Piano</option>
            <option value="forte" selected>Forte</option>
            <option value="fortissimo">Fortissimo</option>
        </select>
    </div>

    <div id="status">Status: Waiting for engine start...</div>

    <div class="keyboard" id="keyboard">
        </div>
</div>

    // 3. PARSING LOGIC
    const db = {
        'pianissimo': {}, 'piano': {}, 'mezzo-piano': {},
        'mezzo-forte': {}, 'forte': {}, 'fortissimo': {}
    };

    function processList(listString) {
        const lines = listString.split('\n');
        lines.forEach(line => {
            line = line.trim();
            if (!line) return;
            // Regex to extract Viola specific files
            const match = line.match(/viola_([A-G]s?\d)_(05|1)_([a-z-]+)_arco-normal\.mp3/);
            if (match) {
                const rawNote = match[1];
                const dynamic = match[3];
                // Convert Philharmonia "s" to Tone.js "#" (e.g., Cs3 -> C#3)
                const toneNote = rawNote.replace('s', '#');
                
                // Because we parse the 05 list first and the 1 list second, 
                // the 1-second sample will automatically overwrite the 05 sample if it exists.
                if (db[dynamic]) {
                    db[dynamic][toneNote] = line;
                }
            }
        });
    }

    // Process fallback (0.5s) first, then optimal (1s) to overwrite
    processList(raw05); 
    processList(raw1);  

    // 4. UI AND AUDIO LOGIC
    let currentSampler = null;
    let isContextStarted = false;
    
    // **UPDATE THIS PATH if your viola samples are in a different subfolder**
    const localPath = "Strings/viola/"; 
    
    const keyboardEl = document.getElementById('keyboard');
    const dynamicSelect = document.getElementById('dynamicSelect');
    const statusEl = document.getElementById('status');
    const powerBtn = document.getElementById('powerBtn');

    // Note array spanning C3 (Viola lowest string) to C7
    const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const allNotes = [];
    for (let oct = 3; oct <= 7; oct++) {
        noteNames.forEach(n => {
            if (oct === 7 && n !== "C") return; // Stop exactly at C7
            allNotes.push(n + oct);
        });
    }

    // Build the Keyboard DOM
    function buildKeyboard() {
        allNotes.forEach(note => {
            const isBlack = note.includes('#');
            const keyEl = document.createElement('div');
            keyEl.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            keyEl.dataset.note = note;
            
            if (!isBlack) {
                keyEl.innerText = note;
            }

            // Mouse Events
            keyEl.addEventListener('mousedown', () => triggerNoteOn(note, keyEl));
            keyEl.addEventListener('mouseup', () => triggerNoteOff(note, keyEl));
            keyEl.addEventListener('mouseleave', () => triggerNoteOff(note, keyEl));

            keyboardEl.appendChild(keyEl);
        });
    }

    function triggerNoteOn(note, el) {
        if (!isContextStarted || !currentSampler || el.classList.contains('disabled')) return;
        el.classList.add('playing');
        currentSampler.triggerAttack(note);
    }

    function triggerNoteOff(note, el) {
        if (!isContextStarted || !currentSampler) return;
        el.classList.remove('playing');
        currentSampler.triggerRelease(note);
    }

    // Dynamic Switching Logic
    async function updateDynamicLevel() {
        const dyn = dynamicSelect.value;
        const availableNotesForDyn = db[dyn];

        // 1. Update Keyboard UI (Grey out missing notes)
        document.querySelectorAll('.key').forEach(keyEl => {
            const note = keyEl.dataset.note;
            if (!availableNotesForDyn[note]) {
                keyEl.classList.add('disabled');
            } else {
                keyEl.classList.remove('disabled');
            }
        });

        // 2. Load the specific Sampler map
        statusEl.innerText = `Status: Loading ${dyn.toUpperCase()} samples...`;
        statusEl.style.color = "#c084fc"; // Bright purple loading text
        dynamicSelect.disabled = true;

        if (currentSampler) {
            currentSampler.dispose(); // Free memory of old samples
        }

        currentSampler = new Tone.Sampler({
            urls: availableNotesForDyn,
            baseUrl: localPath,
            onload: () => {
                statusEl.innerText = `Status: Viola ${dyn.toUpperCase()} Ready!`;
                statusEl.style.color = "#4caf50"; // Green ready text
                dynamicSelect.disabled = false;
            }
        }).toDestination();
    }

    // Event Listeners
    powerBtn.addEventListener('click', async () => {
        await Tone.start();
        isContextStarted = true;
        powerBtn.style.display = "none";
        dynamicSelect.disabled = false;
        
        buildKeyboard();
        updateDynamicLevel(); // Load initial default
    });

    dynamicSelect.addEventListener('change', updateDynamicLevel);

</script>
