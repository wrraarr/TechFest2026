<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luddy Orchestra: Dynamic Dragging</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background-color: #0f172a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.95); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #startBtn { padding: 15px 30px; font-size: 1.5rem; font-weight: bold; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s;}
        #startBtn:active { transform: scale(0.95); }
        
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        h1 { margin: 0; color: #38bdf8; font-size: 1.5rem; }
        .hud { margin-top: 15px; font-family: monospace; font-size: 1.2rem; color: #fbbf24; }
        
        /* D3 Elements */
        svg { width: 100vw; height: 100vh; display: block; }
        
        .node { cursor: pointer; }
        .node circle { stroke: #1e293b; stroke-width: 3px; transition: filter 0.1s; }
        .node.dragging circle { filter: brightness(1.5); stroke: #fff; }
        .node text.label { font-family: sans-serif; font-weight: bold; fill: white; pointer-events: none; text-anchor: middle; transform: translateY(-4px); font-size: 14px;}
        .node text.note { font-family: monospace; font-weight: bold; fill: #cbd5e1; pointer-events: none; text-anchor: middle; transform: translateY(12px); font-size: 11px;}
        
        .baton { fill: #fbbf24; }
        .state-ctrl { fill: #f43f5e; }
        .violin { fill: #38bdf8; }
        .viola { fill: #a855f7; }
        .cello { fill: #10b981; }
        .bass { fill: #f97316; }
        
        /* Center Crosshair */
        .crosshair { stroke: #334155; stroke-width: 1px; stroke-dasharray: 4; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="margin-bottom: 20px; font-size: 2rem;">Luddy Digital Twin</h1>
    <button id="startBtn">START AUDIO ENGINE</button>
</div>

<div id="ui">
    <h1>Orchestra Control</h1>
    <p style="color: #94a3b8; margin: 5px 0;">Drag nodes to set pitch. Click to play.</p>
    <div class="hud" id="hud-state">KEY: C Major | CHORD: I</div>
</div>

<svg id="viz"></svg>

<script>
    // --- 1. MUSICAL MATH & LOGIC ---
    let currentKey = 'C';
    let currentChord = 'I';
    
    const keyRoots = { 'C': 0, 'G': 7, 'D': 2, 'A': 9 };
    const chordIntervals = {
        'I': [0, 4, 7],         // Major Triad
        'IV': [5, 9, 12],       // Subdominant
        'V': [7, 11, 14],       // Dominant
        'V7': [7, 11, 14, 17]   // Dominant 7th
    };

    const MAX_RAD = 350; // The outer boundary of the dragging area

    // Snaps a raw MIDI value to the closest valid chord note
    function getClosestChordNote(rawMidi) {
        let validNotes = [];
        let rootOffset = keyRoots[currentKey];
        let intervals = chordIntervals[currentChord];
        
        // Generate chord notes from Octave 1 to 7
        for (let oct = 0; oct <= 7; oct++) {
            let baseMidi = (oct + 1) * 12 + rootOffset;
            intervals.forEach(interval => validNotes.push(baseMidi + interval));
        }

        return validNotes.reduce((prev, curr) => 
            Math.abs(curr - rawMidi) < Math.abs(prev - rawMidi) ? curr : prev
        );
    }

    // --- 2. AUDIO ENGINE ---
    // Simple synth to hear the notes immediately
    const synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "triangle" },
        envelope: { attack: 0.05, decay: 0.2, sustain: 0.4, release: 1.5 }
    }).toDestination();
    synth.connect(new Tone.Reverb(2).toDestination());

    // --- 3. D3 GRAPH SETUP ---
    const width = window.innerWidth;
    const height = window.innerHeight;
    const cx = width / 2;
    const cy = height / 2;

    // The Instrument Ranges
    // Violin: G3(55) - G7(103)
    // Viola: C3(48) - C7(96)
    // Cello: C2(36) - C6(84)
    // Bass: C1(24) - C5(72)
    
    const nodesData = [
        // Controls
        { id: "BATON", type: "baton", label: "BATON", r: 35, isPlayer: false },
        { id: "KEY", type: "state-ctrl", label: "KEY", r: 30, isPlayer: false },
        { id: "CHORD", type: "state-ctrl", label: "CHORD", r: 30, isPlayer: false },
        
        // Players
        { id: "V1", type: "violin", label: "V1", r: 25, isPlayer: true, minMidi: 55, maxMidi: 103 },
        { id: "V2", type: "violin", label: "V2", r: 25, isPlayer: true, minMidi: 55, maxMidi: 103 },
        { id: "V3", type: "violin", label: "V3", r: 25, isPlayer: true, minMidi: 55, maxMidi: 103 },
        { id: "V4", type: "violin", label: "V4", r: 25, isPlayer: true, minMidi: 55, maxMidi: 103 },
        { id: "VA1", type: "viola", label: "VA1", r: 28, isPlayer: true, minMidi: 48, maxMidi: 96 },
        { id: "VA2", type: "viola", label: "VA2", r: 28, isPlayer: true, minMidi: 48, maxMidi: 96 },
        { id: "C1", type: "cello", label: "C1", r: 30, isPlayer: true, minMidi: 36, maxMidi: 84 },
        { id: "C2", type: "cello", label: "C2", r: 30, isPlayer: true, minMidi: 36, maxMidi: 84 },
        { id: "B1", type: "bass", label: "B1", r: 35, isPlayer: true, minMidi: 24, maxMidi: 72 }
    ];

    const svg = d3.select("#viz").attr("viewBox", [0, 0, width, height]);

    // Draw center crosshairs so you know where the "highest pitch" center is
    svg.append("line").attr("class", "crosshair").attr("x1", cx).attr("y1", cy - 20).attr("x2", cx).attr("y2", cy + 20);
    svg.append("line").attr("class", "crosshair").attr("x1", cx - 20).attr("y1", cy).attr("x2", cx + 20).attr("y2", cy);
    svg.append("circle").attr("class", "crosshair").attr("cx", cx).attr("cy", cy).attr("r", MAX_RAD).style("fill", "none");

    // Render Nodes
    const nodeElements = svg.append("g")
        .selectAll("g")
        .data(nodesData).join("g")
        .attr("class", "node")
        .attr("id", d => `node-${d.id}`);

    nodeElements.append("circle")
        .attr("r", d => d.r).attr("class", d => d.type);

    nodeElements.append("text").attr("class", "label").text(d => d.label);
    nodeElements.append("text").attr("class", "note").text("");

    // --- 4. STARTUP PHYSICS (To arrange them nicely) ---
    // Pushes them away from each other and towards a nice circle
    const simulation = d3.forceSimulation(nodesData)
        .force("collide", d3.forceCollide(d => d.r + 10))
        .force("charge", d3.forceManyBody().strength(-200))
        .force("center", d3.forceCenter(cx, cy))
        .on("tick", () => {
            nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
            updateAllPitches();
        });

    // Stop physics after 1 second so we can drag them manually
    setTimeout(() => {
        simulation.stop();
        console.log("Physics frozen. Ready for manual dragging.");
    }, 1000);

    // --- 5. DRAG & UPDATE LOGIC ---
    
    // Updates the internal MIDI and Note Name for a node based on its XY coords
    function updatePitchForNode(d) {
        if (!d.isPlayer) return;
        
        let dist = Math.hypot(d.x - cx, d.y - cy);
        let pct = Math.min(dist / MAX_RAD, 1); // Clamp at edge
        
        // Center (pct 0) = maxMidi. Edge (pct 1) = minMidi.
        let rawMidi = d.maxMidi - (pct * (d.maxMidi - d.minMidi));
        d.midi = getClosestChordNote(rawMidi);
        d.noteName = Tone.Frequency(d.midi, "midi").toNote();
        
        // Update the text label visually
        d3.select(`#node-${d.id}`).select("text.note").text(d.noteName);
    }

    function updateAllPitches() {
        nodesData.forEach(updatePitchForNode);
    }

    // Custom Drag Behavior
    const dragHandler = d3.drag()
        .on("start", function(event, d) {
            d3.select(this).classed("dragging", true);
            d.dragStartX = d.x; // Save starting position to detect clicks vs drags
            d.dragStartY = d.y;
        })
        .on("drag", function(event, d) {
            d.x = event.x;
            d.y = event.y;
            
            // Constrain players to the MAX_RAD circle
            if (d.isPlayer) {
                let dx = d.x - cx;
                let dy = d.y - cy;
                let dist = Math.hypot(dx, dy);
                if (dist > MAX_RAD) {
                    d.x = cx + (dx / dist) * MAX_RAD;
                    d.y = cy + (dy / dist) * MAX_RAD;
                }
            }

            d3.select(this).attr("transform", `translate(${d.x},${d.y})`);
            updatePitchForNode(d);
        })
        .on("end", function(event, d) {
            d3.select(this).classed("dragging", false);
            
            // If they didn't really move it, treat it as a click
            let moveDist = Math.hypot(d.x - d.dragStartX, d.y - d.dragStartY);
            if (moveDist < 3) {
                triggerAction(d);
            }
        });

    nodeElements.call(dragHandler);

    // --- 6. CLICK / TRIGGER LOGIC ---
    
    function triggerAction(d) {
        if (d.id === "BATON") {
            // Trigger all players
            let notes = nodesData.filter(n => n.isPlayer).map(n => n.noteName);
            synth.triggerAttackRelease(notes, "8n");
            flashBackground();
        } 
        else if (d.id === "KEY") {
            const keys = ['C', 'G', 'D', 'A'];
            currentKey = keys[(keys.indexOf(currentKey) + 1) % keys.length];
            updateGlobalState();
        } 
        else if (d.id === "CHORD") {
            const chords = ['I', 'IV', 'V', 'V7'];
            currentChord = chords[(chords.indexOf(currentChord) + 1) % chords.length];
            updateGlobalState();
        } 
        else if (d.isPlayer) {
            // Trigger single instrument
            synth.triggerAttackRelease(d.noteName, "8n");
            
            let circle = d3.select(`#node-${d.id} circle`);
            circle.style("filter", "brightness(2)");
            setTimeout(() => circle.style("filter", "none"), 150);
        }
    }

    function updateGlobalState() {
        document.getElementById('hud-state').innerText = `KEY: ${currentKey} Major | CHORD: ${currentChord}`;
        updateAllPitches(); // Instantly snap all nodes to the new chord
    }

    function flashBackground() {
        d3.select("body").style("background-color", "#1e293b");
        setTimeout(() => d3.select("body").style("background-color", "#0f172a"), 100);
    }

    // --- INIT ---
    document.getElementById('startBtn').addEventListener('click', async () => {
        await Tone.start();
        document.getElementById('overlay').style.display = 'none';
        updateGlobalState();
    });

</script>
</body>
</html>
