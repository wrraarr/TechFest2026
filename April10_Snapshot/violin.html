<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philharmonia Arco Sampler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121826;
            color: #e2e8f0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        .controls {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        select, button {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        select { background: #334155; color: white; border: 1px solid #475569; }
        button { background: #ef4444; color: white; transition: 0.2s; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        #status { font-family: monospace; color: #94a3b8; margin-bottom: 20px; }

        /* Keyboard CSS */
        .keyboard {
            display: flex;
            justify-content: center;
            position: relative;
            margin-top: 40px;
            height: 200px;
            user-select: none;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        .key {
            box-sizing: border-box;
            border: 1px solid #000;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            transition: background 0.1s;
            position: relative;
        }
        .white-key {
            width: 45px;
            height: 200px;
            background: #f8fafc;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            color: #475569;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .white-key:active, .white-key.playing { background: #cbd5e1; }
        
        .black-key {
            width: 28px;
            height: 120px;
            background: #0f172a;
            z-index: 2;
            margin-left: -14px;
            margin-right: -14px;
            border-radius: 0 0 4px 4px;
        }
        .black-key:active, .black-key.playing { background: #334155; }

        /* Missing Sample State */
        .key.disabled {
            background: #475569; /* Greyed out */
            pointer-events: none;
            opacity: 0.5;
            border-color: #334155;
        }
        .black-key.disabled {
            background: #1e293b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎻 Arco Master Controller</h1>
    <p>Dynamically mapping samples from G3 to G7</p>

    <div class="controls">
        <button id="powerBtn">1. START ENGINE</button>
        <select id="dynamicSelect" disabled>
            <option value="pianissimo">Pianissimo</option>
            <option value="piano">Piano</option>
            <option value="mezzo-piano">Mezzo-Piano</option>
            <option value="mezzo-forte">Mezzo-Forte</option>
            <option value="forte" selected>Forte</option>
            <option value="fortissimo">Fortissimo</option>
        </select>
    </div>

    <div id="status">Status: Waiting for engine start...</div>

    <div class="keyboard" id="keyboard">
        </div>
</div>

    // 2. PARSING LOGIC
    const db = {
        'pianissimo': {}, 'piano': {}, 'mezzo-piano': {},
        'mezzo-forte': {}, 'forte': {}, 'fortissimo': {}
    };

    function processList(listString) {
        const lines = listString.split('\n');
        lines.forEach(line => {
            line = line.trim();
            if (!line) return;
            // Regex matches: violin_[Note]_[Duration]_[Dynamic]_arco-normal.mp3
            const match = line.match(/violin_([A-G]s?\d)_(05|1)_([a-z-]+)_arco-normal\.mp3/);
            if (match) {
                const rawNote = match[1];
                const dynamic = match[3];
                // Convert Philharmonia "s" to Tone.js "#" (e.g., As3 -> A#3)
                const toneNote = rawNote.replace('s', '#');
                
                // Because we parse the 05 list first and the 1 list second, 
                // the 1-second sample will automatically overwrite the 05 sample if it exists.
                if (db[dynamic]) {
                    db[dynamic][toneNote] = line;
                }
            }
        });
    }

    processList(raw05); 
    processList(raw1);  

    // 3. UI AND AUDIO LOGIC
    let currentSampler = null;
    let isContextStarted = false;
    const localPath = "Strings/violin/";
    const keyboardEl = document.getElementById('keyboard');
    const dynamicSelect = document.getElementById('dynamicSelect');
    const statusEl = document.getElementById('status');
    const powerBtn = document.getElementById('powerBtn');

    // Note array spanning G3 to G7
    const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const allNotes = [];
    for (let oct = 3; oct <= 7; oct++) {
        noteNames.forEach(n => {
            if (oct === 3 && ["C", "C#", "D", "D#", "E", "F", "F#"].includes(n)) return; // Start at G3
            if (oct === 7 && ["G#", "A", "A#", "B"].includes(n)) return; // End at G7
            allNotes.push(n + oct);
        });
    }

    // Build the Keyboard DOM
    function buildKeyboard() {
        allNotes.forEach(note => {
            const isBlack = note.includes('#');
            const keyEl = document.createElement('div');
            keyEl.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            keyEl.dataset.note = note;
            
            if (!isBlack) {
                keyEl.innerText = note;
            }

            // Mouse Events
            keyEl.addEventListener('mousedown', () => triggerNoteOn(note, keyEl));
            keyEl.addEventListener('mouseup', () => triggerNoteOff(note, keyEl));
            keyEl.addEventListener('mouseleave', () => triggerNoteOff(note, keyEl));

            keyboardEl.appendChild(keyEl);
        });
    }

    function triggerNoteOn(note, el) {
        if (!isContextStarted || !currentSampler || el.classList.contains('disabled')) return;
        el.classList.add('playing');
        currentSampler.triggerAttack(note);
    }

    function triggerNoteOff(note, el) {
        if (!isContextStarted || !currentSampler) return;
        el.classList.remove('playing');
        currentSampler.triggerRelease(note);
    }

    // Dynamic Switching Logic
    async function updateDynamicLevel() {
        const dyn = dynamicSelect.value;
        const availableNotesForDyn = db[dyn];

        // 1. Update Keyboard UI (Grey out missing notes)
        document.querySelectorAll('.key').forEach(keyEl => {
            const note = keyEl.dataset.note;
            if (!availableNotesForDyn[note]) {
                keyEl.classList.add('disabled');
            } else {
                keyEl.classList.remove('disabled');
            }
        });

        // 2. Load the specific Sampler map
        statusEl.innerText = `Status: Loading ${dyn.toUpperCase()} samples...`;
        statusEl.style.color = "#f59e0b";
        dynamicSelect.disabled = true;

        if (currentSampler) {
            currentSampler.dispose(); // Free memory of old samples
        }

        currentSampler = new Tone.Sampler({
            urls: availableNotesForDyn,
            baseUrl: localPath,
            onload: () => {
                statusEl.innerText = `Status: ${dyn.toUpperCase()} Ready!`;
                statusEl.style.color = "#22c55e";
                dynamicSelect.disabled = false;
            }
        }).toDestination();
    }

    // Event Listeners
    powerBtn.addEventListener('click', async () => {
        await Tone.start();
        isContextStarted = true;
        powerBtn.style.display = "none";
        dynamicSelect.disabled = false;
        
        buildKeyboard();
        updateDynamicLevel(); // Load initial default (Forte)
    });

    dynamicSelect.addEventListener('change', updateDynamicLevel);

</script>
